teleop_twist_joy_node:
  ros__parameters:
    # 8BitDo Micro (assisted-teleop/config/joystick_8bitdo_micro.yaml 기준)
    # D-pad: 축0=좌우(회전), 축1=상하(전진)
    axis_linear:
      x: 1
    axis_angular:
      yaw: 0
    scale_linear:
      x: 0.20
    scale_linear_turbo:
      x: 0.22
    scale_angular:
      yaw: 1.0
    scale_angular_turbo:
      yaw: 1.5
    require_enable_button: false  # D-pad만으로 바로 이동
    enable_turbo_button: 7        # R 버튼 = 터보
