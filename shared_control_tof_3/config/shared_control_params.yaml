tof_array:
  ros__parameters:
    # 3개 ToF 시리얼 포트 (udev 심볼릭 링크 권장)
    port_front: /dev/tof_front
    port_left:  /dev/tof_left
    port_right: /dev/tof_right
    baud: 115200
    # 각 8x8 그리드의 ROI (정면 판단용). 아래쪽 행(R5~R7)은 바닥을 읽어 제외.
    # 행은 아래에서 4번째(R4)부터 위로 = [2,4](3행), 열은 전체 8열 [0,7] → 8x3 영역.
    roi_rows: [2, 4]
    roi_cols: [0, 7]
    field_of_view: 0.79      # rad (VL53L8CX ~45°)
    min_range: 0.02          # m
    max_range: 4.0           # m
    stale_timeout: 0.5       # s  프레임 없으면 max_range(=clear) 발행
    publish_rate: 20.0       # Hz

assist_controller:
  ros__parameters:
    # ── 전방 장애물 판정 (히스테리시스) ─────────────────────────
    front_enter_threshold: 0.50   # m  front<=이 값 → 회피 진입 (500mm)
    front_exit_threshold:  0.65   # m  front>이 값 → 회피 종료
    # ── 측면(45° ToF) 벽 회피 ───────────────────────────────────
    side_min_distance: 0.20       # m (200mm) 측면이 이 값 이내 → 벽에서 멀어지게 회전(전진정지)
    side_clear_margin: 0.05       # m  side_min+이 값 이상 벌어지면 회피 해제(히스테리시스)
    front_stop_distance: 0.25     # m  전방이 이 값 이하 → 전진 멈추고 제자리 회전 탐색
    # ── 회피 속도 (비례 조향: 장애물 가까울수록 강하게) ─────────
    v_avoid: 0.10                 # m/s 회피 시 최대 전진속도
    w_avoid: 0.6                  # rad/s 최대 회전 (front_stop 이하, 가장 근접 시)
    w_min:   0.15                 # rad/s 최소 회전 (front_enter, 막 감지 시)
    # ── 조이스틱 판정 ───────────────────────────────────────────
    forward_eps: 0.02             # m/s 초과면 "전진 의도" 로 간주
    engage_eps:  0.02             # 입력 유무 판정 (linear/angular 공통)
    cmd_timeout: 0.3              # s  manual 명령 stale 판정
    # 센서 무효(미연결/펌웨어 이상으로 데이터 없음) 시 그 방향을 '막힘'으로 간주(안전).
    # 우측 ToF 복구 전까지 우회피 오판을 막아준다. 모든 센서 정상이면 영향 없음.
    treat_stale_as_blocked: true
    rate: 20.0                    # Hz
